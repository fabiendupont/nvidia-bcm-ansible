---
# Deploy BCM Lite Daemon (agent) on OpenShift nodes
# This enables BCM to manage LiteNodes after conversion
#
# Two-step process:
# 1. Build image locally on BCM head node (infrequent - only when base/repo/zip changes)
# 2. Push image and deploy to cluster (per-cluster)
#
# Prerequisites:
# 1. Bootstrap certificates on BCM head node (/cm/local/apps/cmd/etc/bootstrap/)
# 2. kubernetes.core Ansible collection
# 3. containers.podman Ansible collection

# Step 1: Build BCM agent image locally (if needed)
- name: Include BCM agent image build tasks
  ansible.builtin.include_tasks: build_bcm_agent_image.yml

# Step 2: Push image and deploy to cluster
- name: Include BCM agent deployment tasks
  ansible.builtin.include_tasks: deploy_agent.yml
