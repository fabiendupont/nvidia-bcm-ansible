---
# Deploy BCM agent via Helm chart after LiteNode conversion
# This step runs per-cluster and handles:
# 1. Create namespace
# 2. Push image to OpenShift internal registry
# 3. Create bootstrap certificate Secret
# 4. Deploy Helm chart

- name: Display BCM agent deployment configuration
  ansible.builtin.debug:
    msg:
      - "============================================"
      - "BCM Agent Deployment"
      - "============================================"
      - "Cluster: {{ cluster_name }}"
      - "Namespace: {{ bcm_agent_namespace }}"
      - "BCM Server: {{ bcm_server }}:8081"
      - "Local image: {{ bcm_agent_local_image }}:{{ bcm_agent_local_tag }}"
      - "============================================"

- name: Check if bootstrap certificate exists on BCM
  ansible.builtin.stat:
    path: "/cm/local/apps/cmd/etc/bootstrap/cert.pem"
  register: bootstrap_cert

- name: Fail if bootstrap certificate not found
  ansible.builtin.fail:
    msg: |
      Bootstrap certificate not found. Please run setup_bcm_bootstrap_certs.yml playbook first:
      ansible-playbook -i inventory/openshift_test_cluster.yml playbooks/setup_bcm_bootstrap_certs.yml
  when: not bootstrap_cert.stat.exists

# Step 1: Create namespace

- name: Create BCM agent namespace
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: "{{ bcm_agent_namespace }}"
    state: present
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

# Step 2: Push image to OpenShift internal registry

- name: Get OpenShift service account token for registry authentication
  ansible.builtin.command:
    cmd: "/openshift/tools/{{ openshift_version }}/oc sa get-token default -n {{ bcm_agent_namespace }}"
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  register: oc_token
  changed_when: false

- name: Login to OpenShift internal registry with podman
  containers.podman.podman_login:
    registry: image-registry.openshift-image-registry.svc:5000
    username: unused
    password: "{{ oc_token.stdout }}"
    tlsverify: no

- name: Tag local image for OpenShift internal registry
  containers.podman.podman_image:
    name: "{{ bcm_agent_local_image }}:{{ bcm_agent_local_tag }}"
    tag: "image-registry.openshift-image-registry.svc:5000/{{ bcm_agent_namespace }}/bcm-agent:{{ bcm_agent_local_tag }}"
    state: present

- name: Push bcm-agent image to OpenShift internal registry
  containers.podman.podman_image:
    name: "image-registry.openshift-image-registry.svc:5000/{{ bcm_agent_namespace }}/bcm-agent"
    tag: "{{ bcm_agent_local_tag }}"
    push: yes
    validate_certs: no
  register: image_push

- name: Display image push result
  ansible.builtin.debug:
    msg: "Container image pushed to: image-registry.openshift-image-registry.svc:5000/{{ bcm_agent_namespace }}/bcm-agent:{{ bcm_agent_local_tag }}"

# Step 3: Create bootstrap certificate Secret

- name: Read BCM CA certificate
  ansible.builtin.slurp:
    src: "/cm/local/apps/cmd/etc/cacert.pem"
  register: bcm_ca_cert_b64

- name: Read BCM bootstrap certificate
  ansible.builtin.slurp:
    src: "/cm/local/apps/cmd/etc/bootstrap/cert.pem"
  register: bcm_bootstrap_cert_b64

- name: Read BCM bootstrap key
  ansible.builtin.slurp:
    src: "/cm/local/apps/cmd/etc/bootstrap/cert.key"
  register: bcm_bootstrap_key_b64

- name: Create BCM certificate Secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: bcm-bootstrap-cert
        namespace: "{{ bcm_agent_namespace }}"
      type: Opaque
      data:
        cacert.pem: "{{ bcm_ca_cert_b64.content }}"
        cert.pem: "{{ bcm_bootstrap_cert_b64.content }}"
        cert.key: "{{ bcm_bootstrap_key_b64.content }}"
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

# Step 4: Deploy Helm chart

- name: Deploy bcm-agent Helm chart
  kubernetes.core.helm:
    name: bcm-agent
    chart_ref: "{{ bcm_agent_helm_chart_path }}"
    release_namespace: "{{ bcm_agent_namespace }}"
    create_namespace: true
    values:
      image:
        repository: "image-registry.openshift-image-registry.svc:5000/{{ bcm_agent_namespace }}/bcm-agent"
        tag: "{{ bcm_agent_local_tag }}"
        pullPolicy: Always
      config:
        bcm:
          host: "{{ bcm_server }}"
          port: 8081
        kubernetes:
          syncInterval: 300
          labelPrefix: "bcm.nvidia.com"
          enableLabeling: true
      certificates:
        secretName: bcm-bootstrap-cert
      resources:
        requests:
          memory: "256Mi"
          cpu: "100m"
        limits:
          memory: "512Mi"
          cpu: "500m"
      metrics:
        enabled: true
        port: 9100
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  register: helm_deploy

- name: Wait for bcm-agent DaemonSet to be ready
  ansible.builtin.command:
    cmd: "/openshift/tools/{{ openshift_version }}/oc rollout status daemonset/bcm-agent -n {{ bcm_agent_namespace }} --timeout=5m"
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  register: daemonset_status
  changed_when: false

- name: Display agent deployment status
  ansible.builtin.debug:
    msg: "BCM agent deployed successfully across {{ cluster_nodes | length }} nodes"

- name: Wait for agents to establish connection to BCM
  ansible.builtin.pause:
    seconds: 30
    prompt: "Waiting for BCM agents to connect to BCM server..."

- name: Display agent deployment summary
  ansible.builtin.debug:
    msg:
      - "============================================"
      - "BCM Agent Deployment Complete"
      - "============================================"
      - "Namespace: {{ bcm_agent_namespace }}"
      - "Agent pods running on {{ cluster_nodes | length }} nodes"
      - "Agents connecting to BCM at {{ bcm_server }}:8081"
      - ""
      - "Verify deployment:"
      - "  oc get pods -n {{ bcm_agent_namespace }}"
      - "  oc logs -n {{ bcm_agent_namespace }} -l app.kubernetes.io/name=bcm-agent"
      - ""
      - "Verify LiteNode status in BCM:"
      - "  cmsh -c 'device; list -L'"
      - "============================================"
