---
###############################################################################
# Test RHEL 9.6 PXE Boot Installation
###############################################################################
#
# This playbook tests the complete PXE boot workflow:
# 1. Mount RHEL 9.6 ISO and serve via HTTP
# 2. Extract kernel and initrd for PXE boot
# 3. Create kickstart file for automated installation
# 4. Create BCM category and configure PXE
# 5. Create/configure node in BCM
# 6. Node boots via PXE and installs RHEL 9.6
#
# Prerequisites:
# - RHEL 9.6 DVD ISO at /root/rhel-9.6-x86_64-dvd.iso
# - VM created with network boot enabled
# - VM MAC address
#
# Usage:
#   ansible-playbook test-rhel96-pxe.yml -e vm_name=rhel96-test -e vm_mac=52:54:00:xx:xx:xx
#
###############################################################################

- name: Test RHEL 9.6 PXE Boot Installation
  hosts: localhost
  gather_facts: yes
  become: yes

  vars:
    ansible_python_interpreter: /cm/local/apps/python312/bin/python3.12
    # VM configuration (override with -e)
    vm_name: "rhel96-test"
    vm_mac: ""  # Required: provide via -e vm_mac=52:54:00:xx:xx:xx
    vm_ip: "10.141.160.100"  # Static IP for test VM

    # RHEL configuration
    rhel_iso: "/root/rhel-9.6-x86_64-dvd.iso"
    rhel_version: "9.6"
    rhel_mirror_path: "/tftpboot/rhel96"
    rhel_mount_path: "/mnt/rhel96-iso"

    # BCM configuration
    bcm_server: "10.141.255.254"
    bcm_http_port: 8080
    category_name: "rhel96-test"

    # PXE configuration
    tftp_root: "/tftpboot"
    pxe_images_dir: "{{ tftp_root }}/images/{{ category_name }}"

    # Kickstart configuration
    ks_dir: "/tftpboot/ks"
    ks_file: "{{ category_name }}.cfg"
    root_password: "$6$rounds=4096$saltsalt$YhQjLABXbXxJ9jPuOvL6dXeOoQgA7vXCReN1l4vNz/V3khL9n.wVQz8l3o.xDJbGb5dZfKsJoYJ2JVj1WqBnX1"  # changeme123

  tasks:
    ###########################################################################
    # Phase 1: Validation
    ###########################################################################

    - name: Validate VM MAC address is provided
      ansible.builtin.assert:
        that:
          - vm_mac is defined
          - vm_mac | length > 0
        fail_msg: "VM MAC address is required. Use: -e vm_mac=52:54:00:xx:xx:xx"

    - name: Check RHEL ISO exists
      ansible.builtin.stat:
        path: "{{ rhel_iso }}"
      register: iso_stat

    - name: Fail if ISO not found
      ansible.builtin.fail:
        msg: "RHEL ISO not found at {{ rhel_iso }}"
      when: not iso_stat.stat.exists

    - name: Display test configuration
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "RHEL 9.6 PXE Boot Test Configuration"
          - "=========================================="
          - "VM Name: {{ vm_name }}"
          - "VM MAC: {{ vm_mac }}"
          - "VM IP: {{ vm_ip }}"
          - "Category: {{ category_name }}"
          - "ISO: {{ rhel_iso }}"
          - "Mirror: http://{{ bcm_server }}:{{ bcm_http_port }}/tftpboot/rhel96"
          - "Kickstart: http://{{ bcm_server }}:{{ bcm_http_port }}/tftpboot/ks/{{ ks_file }}"
          - "=========================================="

    ###########################################################################
    # Phase 2: Setup HTTP Mirror
    ###########################################################################

    - name: Create mount point for ISO
      ansible.builtin.file:
        path: "{{ rhel_mount_path }}"
        state: directory
        mode: '0755'

    - name: Check if ISO is already mounted
      ansible.builtin.shell: mount | grep "{{ rhel_mount_path }}"
      register: mount_check
      ignore_errors: yes
      changed_when: false

    - name: Mount RHEL ISO
      ansible.posix.mount:
        path: "{{ rhel_mount_path }}"
        src: "{{ rhel_iso }}"
        fstype: iso9660
        opts: loop,ro
        state: mounted
      when: mount_check.rc != 0

    - name: Create HTTP mirror directory
      ansible.builtin.file:
        path: "{{ rhel_mirror_path }}/os"
        state: directory
        mode: '0755'

    - name: Check if mirror is already bind mounted
      ansible.builtin.shell: mount | grep "{{ rhel_mirror_path }}/os"
      register: mirror_mount_check
      ignore_errors: yes
      changed_when: false

    - name: Bind mount ISO to HTTP mirror path
      ansible.posix.mount:
        path: "{{ rhel_mirror_path }}/os"
        src: "{{ rhel_mount_path }}"
        fstype: none
        opts: bind,ro
        state: mounted
      when: mirror_mount_check.rc != 0

    - name: Verify HTTP mirror is accessible
      ansible.builtin.uri:
        url: "http://{{ bcm_server }}:{{ bcm_http_port }}/tftpboot/rhel96/os/.treeinfo"
        status_code: 200
      retries: 3
      delay: 2

    ###########################################################################
    # Phase 3: Extract PXE Boot Files
    ###########################################################################

    - name: Create PXE images directory
      ansible.builtin.file:
        path: "{{ pxe_images_dir }}"
        state: directory
        mode: '0755'

    - name: Copy kernel (vmlinuz) for PXE boot
      ansible.builtin.copy:
        src: "{{ rhel_mount_path }}/images/pxeboot/vmlinuz"
        dest: "{{ pxe_images_dir }}/vmlinuz"
        remote_src: yes
        mode: '0644'

    - name: Copy initrd for PXE boot
      ansible.builtin.copy:
        src: "{{ rhel_mount_path }}/images/pxeboot/initrd.img"
        dest: "{{ pxe_images_dir }}/initrd.img"
        remote_src: yes
        mode: '0644'

    - name: Verify PXE boot files
      ansible.builtin.stat:
        path: "{{ pxe_images_dir }}/{{ item }}"
      register: pxe_files
      loop:
        - vmlinuz
        - initrd.img

    - name: Display PXE file sizes
      ansible.builtin.debug:
        msg: "{{ item.item }}: {{ (item.stat.size / 1024 / 1024) | round(2) }} MB"
      loop: "{{ pxe_files.results }}"

    ###########################################################################
    # Phase 4: Create Kickstart File
    ###########################################################################

    - name: Create kickstart directory
      ansible.builtin.file:
        path: "{{ ks_dir }}"
        state: directory
        mode: '0755'

    - name: Create RHEL 9.6 kickstart file
      ansible.builtin.copy:
        dest: "{{ ks_dir }}/{{ ks_file }}"
        mode: '0644'
        content: |
          #version=RHEL9

          # System authorization
          auth --enableshadow --passalgo=sha512

          # Use network installation from local mirror
          url --url="http://{{ bcm_server }}:{{ bcm_http_port }}/tftpboot/rhel96/os"

          # Keyboard and language
          keyboard --vckeymap=us --xlayouts='us'
          lang en_US.UTF-8

          # Network configuration
          network --bootproto=static --device=link --onboot=on --activate \
                  --ip={{ vm_ip }} --netmask=255.255.0.0 \
                  --gateway={{ bcm_server }} --nameserver={{ bcm_server }} \
                  --hostname={{ vm_name }}.eth.cluster

          # Root password (changeme123)
          rootpw --iscrypted {{ root_password }}

          # System timezone
          timezone UTC --utc

          # Disk partitioning
          ignoredisk --only-use=vda
          clearpart --all --initlabel --drives=vda

          # Automatic partitioning
          autopart --type=lvm

          # Bootloader
          bootloader --location=mbr --boot-drive=vda

          # SELinux
          selinux --enforcing

          # Firewall
          firewall --enabled --ssh

          # Do not configure X
          skipx

          # Reboot after installation
          reboot

          # Package selection
          %packages
          @^minimal-environment
          @standard
          curl
          wget
          vim
          net-tools
          %end

          # Post-installation script
          %post --log=/root/ks-post.log

          echo "============================================"
          echo "RHEL 9.6 PXE Installation Test - SUCCESS"
          echo "============================================"
          echo "Hostname: {{ vm_name }}.eth.cluster"
          echo "IP: {{ vm_ip }}"
          echo "Installed: $(date)"
          echo "BCM Server: {{ bcm_server }}"
          echo "============================================"

          # Create success marker
          touch /root/pxe-install-success

          %end

    - name: Verify kickstart file is accessible
      ansible.builtin.uri:
        url: "http://{{ bcm_server }}:{{ bcm_http_port }}/tftpboot/ks/{{ ks_file }}"
        status_code: 200

    ###########################################################################
    # Phase 5: Create BCM Category
    ###########################################################################

    - name: Create BCM category for RHEL 9.6 test
      nvidia.bcm.bcm_category:
        name: "{{ category_name }}"
        state: present

    ###########################################################################
    # Phase 6: Configure PXE Boot
    ###########################################################################

    - name: Configure category PXE for HTTP boot
      ansible.builtin.copy:
        dest: "{{ tftp_root }}/x86_64/bios/pxelinux.cfg/category.{{ category_name }}"
        mode: '0644'
        content: |
          # RHEL 9.6 PXE Boot Test - {{ category_name }}
          # Generated by Ansible test playbook
          DEFAULT rhel96
          PROMPT 0
          TIMEOUT 10
          MENU TITLE RHEL 9.6 PXE Boot Test

          LABEL rhel96
            KERNEL images/{{ category_name }}/vmlinuz
            APPEND initrd=images/{{ category_name }}/initrd.img \
                   inst.ks=http://{{ bcm_server }}:{{ bcm_http_port }}/tftpboot/ks/{{ ks_file }} \
                   console=tty0
            MENU LABEL ^RHEL 9.6 - Kickstart Installation (Test)
            MENU DEFAULT

    - name: Verify category PXE file exists
      ansible.builtin.stat:
        path: "{{ tftp_root }}/x86_64/bios/pxelinux.cfg/category.{{ category_name }}"
      register: pxe_cat_file

    - name: Display PXE config
      ansible.builtin.command:
        cmd: cat {{ tftp_root }}/x86_64/bios/pxelinux.cfg/category.{{ category_name }}
      register: pxe_content
      changed_when: false

    - name: Show PXE configuration
      ansible.builtin.debug:
        msg: "{{ pxe_content.stdout_lines }}"

    ###########################################################################
    # Phase 7: Create/Update Node in BCM
    ###########################################################################

    - name: Create node in BCM using cmsh
      ansible.builtin.shell: |
        cmsh << 'EOF'
        device
        add genericdevice {{ vm_name }}
        set mac {{ vm_mac }}
        set ip {{ vm_ip }}
        set category {{ category_name }}
        commit
        EOF
      register: cmsh_result
      changed_when: "'Successfully committed' in cmsh_result.stdout"
      failed_when: cmsh_result.rc != 0 and 'already exists' not in cmsh_result.stderr

    - name: Display node creation result
      ansible.builtin.debug:
        msg: "Node {{ vm_name }} created/updated in BCM"

    ###########################################################################
    # Phase 8: Display Instructions
    ###########################################################################

    - name: Display next steps
      ansible.builtin.debug:
        msg:
          - ""
          - "=========================================="
          - "RHEL 9.6 PXE Boot Test - Ready!"
          - "=========================================="
          - ""
          - "Configuration Complete:"
          - "  ✓ HTTP mirror serving RHEL 9.6 ISO"
          - "  ✓ PXE boot files extracted"
          - "  ✓ Kickstart file created"
          - "  ✓ BCM category created: {{ category_name }}"
          - "  ✓ Category PXE configured"
          - "  ✓ Node created/updated in BCM"
          - ""
          - "VM Configuration:"
          - "  Name: {{ vm_name }}"
          - "  MAC: {{ vm_mac }}"
          - "  IP: {{ vm_ip }} (static)"
          - "  Network: internalnet"
          - ""
          - "URLs:"
          - "  Mirror: http://{{ bcm_server }}:{{ bcm_http_port }}/tftpboot/rhel96/os"
          - "  Kickstart: http://{{ bcm_server }}:{{ bcm_http_port }}/tftpboot/ks/{{ ks_file }}"
          - ""
          - "Next Steps:"
          - "  1. Power on the VM"
          - "  2. VM will PXE boot from BCM"
          - "  3. Kickstart will install RHEL 9.6 automatically"
          - "  4. VM will reboot into installed OS"
          - ""
          - "Monitor Installation:"
          - "  - Watch VM console for progress"
          - "  - Check DHCP leases: cat /var/lib/dhcpd/dhcpd.leases"
          - "  - Check TFTP logs: journalctl -u tftpd.service -f"
          - "  - Check HTTP logs: tail -f /var/log/httpd/access_log"
          - ""
          - "After Installation:"
          - "  - SSH: ssh root@{{ vm_ip }}"
          - "  - Password: changeme123"
          - "  - Verify: cat /root/pxe-install-success"
          - ""
          - "=========================================="

    ###########################################################################
    # Phase 9: Optional - Monitor Installation
    ###########################################################################

    - name: Wait for installation (optional)
      ansible.builtin.pause:
        prompt: |

          Press ENTER to skip monitoring, or Ctrl+C then 'A' to abort

          To monitor installation in another terminal:
            journalctl -u tftpd.service -f
            tail -f /var/log/httpd/access_log

          Installation typically takes 5-10 minutes.

    - name: Check if VM is accessible via SSH
      ansible.builtin.wait_for:
        host: "{{ vm_ip }}"
        port: 22
        timeout: 1800  # 30 minutes max
        msg: "Waiting for {{ vm_name }} to complete installation and reboot..."
      register: ssh_check
      ignore_errors: yes

    - name: Verify installation success
      ansible.builtin.command:
        cmd: ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@{{ vm_ip }} "cat /root/pxe-install-success"
      register: install_check
      ignore_errors: yes
      when: ssh_check is succeeded

    - name: Display installation result
      ansible.builtin.debug:
        msg:
          - ""
          - "=========================================="
          - "Installation Result"
          - "=========================================="
          - "{% if ssh_check is succeeded and install_check is succeeded %}"
          - "✓ SUCCESS - RHEL 9.6 installed successfully!"
          - "{% elif ssh_check is succeeded %}"
          - "⚠ VM is accessible but success marker not found"
          - "{% else %}"
          - "⏳ Installation in progress or timeout"
          - "{% endif %}"
          - ""
          - "Verify manually:"
          - "  ssh root@{{ vm_ip }}"
          - "  # password: changeme123"
          - ""
          - "=========================================="

