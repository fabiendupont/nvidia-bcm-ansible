---
# Register nodes in BCM with MAC-based Ignition URLs using cmsh

- name: Build category name for each node
  ansible.builtin.set_fact:
    node_category_map: "{{ node_category_map | default({}) | combine({item.name: 'openshift-' + (openshift_version | replace('.', '')) + '-' + cluster_name + '-' + item.role}) }}"
  loop: "{{ cluster_nodes }}"
  loop_control:
    label: "{{ item.name }}"

- name: Register OpenShift cluster nodes via cmsh
  ansible.builtin.shell: |
    cmsh << 'EOF'
    device
    add physicalnode {{ item.name }}
    use {{ item.name }}
    set mac {{ item.mac }}
    interfaces
    add physical BOOTIF
    use BOOTIF
    set ip {{ item.ip }}
    set network internalnet
    ..
    ..
    device
    use {{ item.name }}
    set provisioninginterface BOOTIF
    set category {{ node_category_map[item.name] }}
    commit
    EOF
  args:
    executable: /bin/bash
  loop: "{{ cluster_nodes }}"
  loop_control:
    label: "{{ item.name }}"
  register: node_result
  changed_when: "'committed' in node_result.stdout"
  failed_when: node_result.rc != 0 and 'already exists' not in node_result.stderr
