---
# Register nodes in BCM using official modules

- name: Build node category map
  ansible.builtin.set_fact:
    node_category_map: "{{ node_category_map | default({}) | combine({node.name: 'rhel-' + (rhel_version | replace('.', '')) + '-' + cluster_name + '-' + node.role}) }}"
  loop: "{{ cluster_nodes }}"
  loop_control:
    loop_var: node
    label: "{{ node.name }}"

- name: Register RHEL cluster nodes
  brightcomputing.bcm110.physical_node:
    name: "{{ node.name }}"
    state: present
    mac: "{{ node.mac }}"
    category: "{{ node_category_map[node.name] }}"
    provisioningInterface: "BOOTIF"
    interfaces_NetworkPhysicalInterface:
      - name: "BOOTIF"
        ip: "{{ node.ip }}"
        network: "internalnet"
  loop: "{{ cluster_nodes }}"
  loop_control:
    loop_var: node
    label: "{{ node.name }}"
