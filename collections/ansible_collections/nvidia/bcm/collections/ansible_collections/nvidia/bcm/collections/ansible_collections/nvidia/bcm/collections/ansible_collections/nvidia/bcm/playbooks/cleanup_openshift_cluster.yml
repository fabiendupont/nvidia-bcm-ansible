---
# Cleanup playbook for OpenShift cluster deployment via BCM
# This playbook performs comprehensive cleanup of:
# - Virtual machines (if created for testing)
# - LiteNodes in BCM
# - PhysicalNodes in BCM
# - BCM categories
# - Software images
# - OpenShift artifacts (kubeconfig, ISO, generated configs)
#
# Usage: ansible-playbook -i inventory/openshift_test_cluster.yml playbooks/cleanup_openshift_cluster.yml

- name: Cleanup OpenShift cluster and BCM resources
  hosts: bcm_headnode
  gather_facts: false

  tasks:
    # ================================================================
    # Phase 1: Stop and delete VMs (if they exist)
    # ================================================================
    - name: Check if VMs exist
      community.libvirt.virt:
        command: list_vms
      register: existing_vms
      delegate_to: "{{ redfish_emulator_host }}"
      when: redfish_emulator_host is defined
      ignore_errors: true

    - name: Stop running VMs for cluster nodes
      community.libvirt.virt:
        name: "{{ item.name }}"
        state: destroyed
      loop: "{{ cluster_nodes }}"
      delegate_to: "{{ redfish_emulator_host }}"
      when:
        - redfish_emulator_host is defined
        - existing_vms is defined
        - existing_vms.list_vms is defined
        - item.name in existing_vms.list_vms
      ignore_errors: true

    - name: Delete VMs for cluster nodes
      community.libvirt.virt:
        name: "{{ item.name }}"
        command: undefine
      loop: "{{ cluster_nodes }}"
      delegate_to: "{{ redfish_emulator_host }}"
      when:
        - redfish_emulator_host is defined
        - existing_vms is defined
        - existing_vms.list_vms is defined
        - item.name in existing_vms.list_vms
      ignore_errors: true

    - name: Delete VM disk images
      ansible.builtin.file:
        path: "/var/lib/libvirt/images/{{ item.name }}.qcow2"
        state: absent
      loop: "{{ cluster_nodes }}"
      delegate_to: "{{ redfish_emulator_host }}"
      when: redfish_emulator_host is defined
      ignore_errors: true

    # ================================================================
    # Phase 2: Remove LiteNodes from BCM
    # ================================================================
    - name: Remove LiteNodes for cluster nodes
      brightcomputing.bcm110.lite_node:
        name: "{{ item.name }}"
        state: absent
      loop: "{{ cluster_nodes }}"
      ignore_errors: true

    # ================================================================
    # Phase 3: Remove PhysicalNodes from BCM
    # ================================================================
    - name: Remove PhysicalNodes for cluster nodes
      brightcomputing.bcm110.physical_node:
        name: "{{ item.name }}"
        state: absent
      loop: "{{ cluster_nodes }}"
      ignore_errors: true

    # ================================================================
    # Phase 4: Remove BCM categories
    # ================================================================
    - name: Build list of cluster-specific categories
      ansible.builtin.set_fact:
        cluster_categories: "{{ node_roles | map(attribute='category') | list }}"

    - name: Remove BCM categories
      brightcomputing.bcm110.category:
        name: "{{ item }}"
        state: absent
      loop: "{{ cluster_categories }}"
      ignore_errors: true

    # ================================================================
    # Phase 5: Remove software images
    # ================================================================
    - name: Remove OpenShift installer software image
      brightcomputing.bcm110.software_image:
        name: "installer-openshift-{{ openshift_version }}"
        state: absent
      ignore_errors: true

    # ================================================================
    # Phase 6: Clean up OpenShift artifacts on BCM head node
    # ================================================================
    - name: Remove OpenShift kubeconfig directory
      ansible.builtin.file:
        path: "/root/openshift"
        state: absent
      ignore_errors: true

    - name: Remove OpenShift agent ISO
      ansible.builtin.file:
        path: "{{ openshift_iso_path }}"
        state: absent
      when: openshift_iso_path is defined
      ignore_errors: true

    - name: Remove temporary install-config.yaml
      ansible.builtin.file:
        path: "/tmp/install-config-{{ cluster_name }}.yaml"
        state: absent
      ignore_errors: true

    - name: Remove temporary agent-config.yaml
      ansible.builtin.file:
        path: "/tmp/agent-config-{{ cluster_name }}.yaml"
        state: absent
      ignore_errors: true

    - name: Remove PXE boot symlinks
      ansible.builtin.file:
        path: "{{ images_path }}/{{ item.category }}"
        state: absent
      loop: "{{ node_roles }}"
      loop_control:
        label: "{{ item.category }}"
      ignore_errors: true

    - name: Remove kickstart files
      ansible.builtin.file:
        path: "{{ ks_path | default('/cm/local/apps/cmd/data/tftpboot/ks') }}/{{ item.category }}.cfg"
        state: absent
      loop: "{{ node_roles }}"
      loop_control:
        label: "{{ item.category }}"
      ignore_errors: true

    - name: Display cleanup summary
      ansible.builtin.debug:
        msg: |
          ========================================
          Cleanup completed for cluster: {{ cluster_name }}
          ========================================
          - VMs: {{ cluster_nodes | length }} node(s) processed
          - LiteNodes: {{ cluster_nodes | length }} removed
          - PhysicalNodes: {{ cluster_nodes | length }} removed
          - Categories: {{ cluster_categories | length }} removed
          - Software images: 1 removed
          - Artifacts: Cleaned
          ========================================
