---
# Deploy BCM Lite Daemon DaemonSet to OpenShift cluster
# This provides BCM management integration for deployed nodes
#
# Requirements:
#   - nvidia-bcm-lite-daemon repository for Helm chart (helm/bcm-agent/)
#   - By default, expects repo as sibling: ../nvidia-bcm-lite-daemon
#   - Override with bcm_daemon_source_path variable if different layout
#
# Bootstrap Certificate Generation:
#   - Uses BCM's pythoncm API (not proprietary register_node script)
#   - Creates cluster-specific bootstrap certificate: k8s-bootstrap-{{ cluster_name }}
#   - Bootstrap cert used by pods to request per-node certificates
#
# Security:
#   - Only approves certificate requests from known cluster nodes
#   - Per-node certificates auto-generated with CN=nodename
#   - Each cluster has unique bootstrap certificate for isolation

- name: Display BCM daemon deployment information
  ansible.builtin.debug:
    msg:
      - "================================================================"
      - "Deploying BCM Lite Daemon DaemonSet"
      - "================================================================"
      - "Cluster: {{ cluster_name }}"
      - "Nodes: {{ cluster_nodes | length }}"
      - "BCM Host: {{ bcm_server }}"
      - "================================================================"

- name: Check if Helm is installed
  ansible.builtin.command: which helm
  register: helm_check
  changed_when: false
  failed_when: false

- name: Install Helm if not present
  ansible.builtin.dnf:
    name: helm
    state: present
    enablerepo: epel
  when: helm_check.rc != 0

- name: Create bootstrap certificate directory
  ansible.builtin.file:
    path: /tmp/bootstrap-cert
    state: directory
    mode: '0700'

- name: Generate cluster-specific bootstrap certificate using pythoncm
  ansible.builtin.shell: |
    cat > /tmp/create_bootstrap_cert_{{ cluster_name }}.py << 'EOF'
    #!/usr/bin/env python3
    import sys
    sys.path.insert(0, '/cm/local/apps/cmd/pythoncm/lib/python3.12/site-packages')

    from pythoncm.cluster import Cluster
    from pythoncm.settings import Settings
    from pythoncm.entity import Certificate

    # Connect to BCM
    settings = Settings(
        host="localhost",
        port=8081,
        cert_file="/cm/local/apps/cmd/etc/cert.pem",
        key_file="/cm/local/apps/cmd/etc/cert.key"
    )

    cluster = Cluster(settings)

    # Create cluster-specific bootstrap certificate
    print("Creating bootstrap certificate for cluster: {{ cluster_name }}")
    cert = Certificate(cluster)
    cert.commonName = "k8s-bootstrap-{{ cluster_name }}"
    cert.profile = "admin"  # Standard profile with cert request permissions
    cert.bits = 4096
    cert.validityDays = 365

    try:
        # Create the certificate
        result = cert.create()
        print(f"Certificate created: {result['uuid']}")

        # Save certificate files
        import os
        os.makedirs("/tmp/bootstrap-cert", exist_ok=True)
        cert.save("/tmp/bootstrap-cert/cert.pem", "/tmp/bootstrap-cert/cert.key")
        print("Certificate saved to /tmp/bootstrap-cert/")

    except Exception as e:
        print(f"Error: {e}")
        sys.exit(1)
    EOF

    /cm/local/apps/python312/bin/python3.12 /tmp/create_bootstrap_cert_{{ cluster_name }}.py
  register: bootstrap_cert_result
  changed_when: "'Certificate created' in bootstrap_cert_result.stdout"

- name: Copy CA certificate to bootstrap directory
  ansible.builtin.copy:
    src: /cm/local/apps/cmd/etc/cacert.pem
    dest: /tmp/bootstrap-cert/cacert.pem
    remote_src: true
    mode: '0600'

- name: Clean up temporary bootstrap certificate script
  ansible.builtin.file:
    path: "/tmp/create_bootstrap_cert_{{ cluster_name }}.py"
    state: absent

- name: Create bootstrap certificate Kubernetes Secret
  ansible.builtin.shell: |
    export KUBECONFIG=/openshift/clusters/{{ cluster_name }}/auth/kubeconfig
    /openshift/tools/{{ openshift_version }}/oc delete secret bcm-bootstrap-cert 2>/dev/null || true
    /openshift/tools/{{ openshift_version }}/oc create secret generic bcm-bootstrap-cert \
      --from-file=cacert.pem=/tmp/bootstrap-cert/cacert.pem \
      --from-file=cert.pem=/tmp/bootstrap-cert/cert.pem \
      --from-file=cert.key=/tmp/bootstrap-cert/cert.key
  register: create_secret
  changed_when: "'created' in create_secret.stdout"

- name: Copy Helm chart to BCM head node
  ansible.builtin.copy:
    src: "{{ bcm_daemon_source_path | default(playbook_dir + '/../nvidia-bcm-lite-daemon') }}/helm/bcm-agent/"
    dest: /tmp/bcm-agent-chart/
    mode: preserve

- name: Create custom Helm values file
  ansible.builtin.copy:
    content: |
      # Custom values for BCM Lite Daemon deployment
      image:
        repository: ghcr.io/fabiendupont/nvidia-bcm-lite-daemon
        pullPolicy: IfNotPresent
        tag: "latest"

      config:
        bcm:
          host: "{{ bcm_server }}"
          port: 8081
        kubernetes:
          syncInterval: 300
          labelPrefix: "bcm.nvidia.com"
          enableLabeling: true
        debug: true
        logLevel: "debug"

      certificates:
        secretName: "bcm-bootstrap-cert"

      metrics:
        enabled: true
        port: 9100

      tolerations:
        - operator: Exists

      priorityClassName: system-node-critical
    dest: /tmp/bcm-daemon-values.yaml
    mode: '0644'

- name: Deploy BCM Lite Daemon via Helm
  ansible.builtin.shell: |
    export KUBECONFIG=/openshift/clusters/{{ cluster_name }}/auth/kubeconfig
    /usr/bin/helm uninstall bcm-agent 2>/dev/null || true
    /usr/bin/helm install bcm-agent /tmp/bcm-agent-chart -f /tmp/bcm-daemon-values.yaml
  register: helm_install
  changed_when: "'deployed' in helm_install.stdout"

- name: Wait for BCM agent pods to start
  ansible.builtin.shell: |
    export KUBECONFIG=/openshift/clusters/{{ cluster_name }}/auth/kubeconfig
    /openshift/tools/{{ openshift_version }}/oc get pods -l app=bcm-agent --no-headers 2>/dev/null | wc -l
  register: pod_count
  until: pod_count.stdout | int == cluster_nodes | length
  retries: 30
  delay: 2
  changed_when: false

- name: Wait for pods to request certificates (allow time for startup)
  ansible.builtin.pause:
    seconds: 15

- name: Get BCM agent pod names
  ansible.builtin.shell: |
    export KUBECONFIG=/openshift/clusters/{{ cluster_name }}/auth/kubeconfig
    /openshift/tools/{{ openshift_version }}/oc get pods -l app=bcm-agent -o name
  register: bcm_pods
  changed_when: false

- name: Extract certificate request IDs from pod logs for cluster nodes
  ansible.builtin.shell: |
    export KUBECONFIG=/openshift/clusters/{{ cluster_name }}/auth/kubeconfig
    POD="{{ item }}"

    # Get logs and extract node name and cert request ID
    NODE_NAME=$(/openshift/tools/{{ openshift_version }}/oc logs $POD --previous 2>/dev/null | grep "Generating per-node certificate for:" | sed 's/.*for: //' || echo "")
    CERT_ID=$(/openshift/tools/{{ openshift_version }}/oc logs $POD --previous 2>/dev/null | grep "Certificate requested:" | sed 's/.*Certificate requested: //' | sed 's/, .*//' || echo "")

    # Only output if this is one of our cluster nodes
    {% for node in cluster_nodes %}
    if [ "$NODE_NAME" = "{{ node.name }}" ]; then
      echo "{{ node.name }}:$CERT_ID"
    fi
    {% endfor %}
  loop: "{{ bcm_pods.stdout_lines }}"
  register: cert_requests
  changed_when: false

- name: Build certificate approval list
  ansible.builtin.set_fact:
    cert_ids_to_approve: "{{ cert_requests.results | map(attribute='stdout') | select | list }}"

- name: Display certificate requests to approve
  ansible.builtin.debug:
    msg: "Certificate requests for cluster nodes: {{ cert_ids_to_approve }}"

- name: Approve certificate requests for cluster nodes only
  ansible.builtin.command:
    cmd: "cmsh -c 'cert; issuecertificate {{ item.split(':')[1] }}'"
  loop: "{{ cert_ids_to_approve }}"
  when: item != ""
  register: approve_certs
  changed_when: "'Issued' in approve_certs.stdout"

- name: Wait for daemon pods to become ready
  ansible.builtin.shell: |
    export KUBECONFIG=/openshift/clusters/{{ cluster_name }}/auth/kubeconfig
    /openshift/tools/{{ openshift_version }}/oc get pods -l app=bcm-agent --no-headers 2>/dev/null | grep -c "1/1.*Running" || echo "0"
  register: ready_pods
  until: ready_pods.stdout | int == cluster_nodes | length
  retries: 60
  delay: 5
  changed_when: false

- name: Verify nodes show UP in BCM
  ansible.builtin.shell: |
    cmsh -c 'device; list litenodes -a name,status' | grep {{ item.name }} | grep -c UP || echo "0"
  loop: "{{ cluster_nodes }}"
  loop_control:
    label: "{{ item.name }}"
  register: bcm_node_status
  changed_when: false
  failed_when: bcm_node_status.stdout | int == 0

- name: Display BCM daemon deployment completion
  ansible.builtin.debug:
    msg:
      - "================================================================"
      - "BCM LITE DAEMON DEPLOYED SUCCESSFULLY"
      - "================================================================"
      - "DaemonSet: bcm-agent"
      - "Pods Running: {{ ready_pods.stdout }}/{{ cluster_nodes | length }}"
      - "All nodes showing UP in BCM"
      - "================================================================"
